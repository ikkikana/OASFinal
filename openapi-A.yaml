openapi: 3.0.0
info:
  title: A - Ouverture Collectivité
  version: 1.0.0

paths:
  /collectivities/requests:
    post:
      summary: Soumettre une demande de création de collectivité
      description: Nécessite au moins 10 membres dont 5 avec 6 mois d’ancienneté.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, city, specialty, membersIds]
              properties:
                name:
                  type: string
                city:
                  type: string
                specialty:
                  type: string
                membersIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Demande créée
        '400':
          description: Conditions non respectées

  /collectivities/{id}/validate:
    get:
      summary: Vérifier les conditions d’ouverture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Résultat validation
        '403':
          description: Refus fédération

  /collectivities:
    post:
      summary: Créer officiellement une collectivité
      responses:
        '200':
          description: Collectivité créée